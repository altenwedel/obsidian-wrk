<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 1180" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect width="880" height="1180" fill="#FFFFFF"/>

  <!-- Header band -->
  <rect x="0" y="0" width="880" height="120" fill="#1E1C5E"/>
  <text x="40" y="58" fill="#FFFFFF" font-size="26" font-weight="bold">Color card — VRK 26277 animatie subsidieproces</text>
  <text x="40" y="88" fill="#E7F5FE" font-size="14">For Claudia, illustrator. Based on Huisstijl VRK (verkorte versie), April 2026.</text>
  <text x="40" y="106" fill="#E7F5FE" font-size="12" opacity="0.85">Prepared by Studio Claro · 27 April 2026 · v01</text>

  <!-- Section 1: PRIMARY COLORS -->
  <text x="40" y="170" fill="#1E1C5E" font-size="16" font-weight="bold" letter-spacing="2">PRIMARY COLORS</text>
  <line x1="40" y1="180" x2="840" y2="180" stroke="#1E1C5E" stroke-width="1.5"/>

  <!-- Dark blue swatch (corporate base) -->
  <rect x="40" y="200" width="380" height="180" fill="#1E1C5E"/>
  <rect x="40" y="380" width="380" height="120" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="60" y="408" fill="#1E1C5E" font-size="20" font-weight="bold">Dark blue</text>
  <text x="60" y="430" fill="#666666" font-size="13">Corporate base — dominant</text>
  <text x="60" y="458" fill="#1E1C5E" font-size="13" font-weight="bold">HEX #1E1C5E</text>
  <text x="60" y="476" fill="#444444" font-size="12">RGB 30, 28, 94</text>
  <text x="60" y="492" fill="#444444" font-size="12">CMYK 100, 100, 31, 25</text>

  <!-- Orange swatch (GGD support) -->
  <rect x="460" y="200" width="380" height="180" fill="#F58A07"/>
  <rect x="460" y="380" width="380" height="120" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="480" y="408" fill="#1E1C5E" font-size="20" font-weight="bold">Orange</text>
  <text x="480" y="430" fill="#666666" font-size="13">GGD support — accents on adviser, GGD context</text>
  <text x="480" y="458" fill="#1E1C5E" font-size="13" font-weight="bold">HEX #F58A07</text>
  <text x="480" y="476" fill="#444444" font-size="12">RGB 245, 138, 7</text>
  <text x="480" y="492" fill="#444444" font-size="12">CMYK 0, 55, 100, 0</text>

  <!-- Section 2: ACCENT COLORS -->
  <text x="40" y="560" fill="#1E1C5E" font-size="16" font-weight="bold" letter-spacing="2">ACCENT COLORS</text>
  <line x1="40" y1="570" x2="840" y2="570" stroke="#1E1C5E" stroke-width="1.5"/>

  <!-- Light blue (accent VRK) -->
  <rect x="40" y="590" width="250" height="120" fill="#E7F5FE"/>
  <rect x="40" y="710" width="250" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="58" y="734" fill="#1E1C5E" font-size="16" font-weight="bold">Light blue</text>
  <text x="58" y="754" fill="#666666" font-size="11">Soft fills, secondary surfaces</text>
  <text x="58" y="776" fill="#1E1C5E" font-size="12" font-weight="bold">HEX #E7F5FE</text>
  <text x="58" y="792" fill="#444444" font-size="11">RGB 231, 245, 254 · CMYK 7, 0, 0, 0</text>

  <!-- Light purple (accent GGD) -->
  <rect x="315" y="590" width="250" height="120" fill="#EFE7F2"/>
  <rect x="315" y="710" width="250" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="333" y="734" fill="#1E1C5E" font-size="16" font-weight="bold">Light purple</text>
  <text x="333" y="754" fill="#666666" font-size="11">Use sparingly, GGD context</text>
  <text x="333" y="776" fill="#1E1C5E" font-size="12" font-weight="bold">HEX #EFE7F2</text>
  <text x="333" y="792" fill="#444444" font-size="11">RGB 239, 231, 242 · CMYK 4, 8, 0, 0</text>

  <!-- Blue (VRK secondary) -->
  <rect x="590" y="590" width="250" height="120" fill="#1098F7"/>
  <rect x="590" y="710" width="250" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="608" y="734" fill="#1E1C5E" font-size="16" font-weight="bold">Blue</text>
  <text x="608" y="754" fill="#666666" font-size="11">VRK secondary, links and highlights</text>
  <text x="608" y="776" fill="#1E1C5E" font-size="12" font-weight="bold">HEX #1098F7</text>
  <text x="608" y="792" fill="#444444" font-size="11">RGB 16, 152, 247 · CMYK 71, 33, 0, 0</text>

  <!-- Section 3: USE WITH CAUTION -->
  <text x="40" y="855" fill="#1E1C5E" font-size="16" font-weight="bold" letter-spacing="2">USE WITH CAUTION</text>
  <line x1="40" y1="865" x2="840" y2="865" stroke="#1E1C5E" stroke-width="1.5"/>

  <!-- Purple (cautious accent) -->
  <rect x="40" y="885" width="380" height="100" fill="#5C0E81"/>
  <rect x="40" y="985" width="380" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="60" y="1009" fill="#1E1C5E" font-size="16" font-weight="bold">Purple</text>
  <text x="60" y="1029" fill="#666666" font-size="11">Only as a small accent, never as a base</text>
  <text x="60" y="1029" fill="#666666" font-size="11"></text>
  <text x="60" y="1051" fill="#1E1C5E" font-size="12" font-weight="bold">HEX #5C0E81</text>
  <text x="60" y="1067" fill="#444444" font-size="11">RGB 92, 14, 129 · CMYK 79, 100, 13, 5</text>

  <!-- Background suggestion -->
  <rect x="460" y="885" width="380" height="100" fill="#F2F2F2"/>
  <rect x="460" y="985" width="380" height="100" fill="#FFFFFF" stroke="#E5E5E5" stroke-width="1"/>
  <text x="480" y="1009" fill="#1E1C5E" font-size="16" font-weight="bold">Background grey</text>
  <text x="480" y="1029" fill="#666666" font-size="11">Studio Claro focus technique: foreground in colour, background neutral grey</text>
  <text x="480" y="1051" fill="#1E1C5E" font-size="12" font-weight="bold">Range #F2F2F2 — #E5E5E5</text>
  <text x="480" y="1067" fill="#444444" font-size="11">Slightly cool, not blueish</text>

  <!-- Footer note -->
  <line x1="40" y1="1110" x2="840" y2="1110" stroke="#E5E5E5" stroke-width="1"/>
  <text x="40" y="1135" fill="#666666" font-size="11" font-style="italic">Note: an earlier brief mentioned purple as the corporate colour. This was corrected to dark blue by Bart Zwagemaker (mails 9 and 13 April 2026).</text>
  <text x="40" y="1155" fill="#666666" font-size="11" font-style="italic">Source: Huisstijl VRK (verkorte versie), April 2026, slides 18 and 19. See 260409-huisstijl-vrk-verkort.md.</text>
</svg>
